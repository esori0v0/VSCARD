<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹 명함</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="card">
    <div class="profile">
      <img src="./duck1.jpg" alt="프로필 이미지" />
    </div>

    <div class="name">이한솔</div>

    <div class="job">Frontend & Backend Developer</div>

    <div class="info">
      <div class="item">
        <div class="icon">✉️</div>

        <div class="text">
          <div class="label">Email</div>
          <div class="value">
            <a href="mailto:hello@example.com">hello@example.com</a>
          </div>
        </div>
      </div>

      <div class="item">
        <div class="icon">📞</div>

        <div class="text">
          <div class="label">Phone</div>
          <div class="value">
            <a href="tel:01012345678">010-1234-5678</a>
          </div>
        </div>
      </div>
    </div>

    <a
      class="github-button"
      href="https://github.com/esori0v0"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="이한솔 GitHub 페이지로 이동"
    >
      😺github
    </a>

    <div class="footer">Clean code. Better product.</div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
