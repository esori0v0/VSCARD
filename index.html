<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹 명함</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="card">
    <div class="card-left">
      <div class="profile">
        <img src="./duck1.jpg" alt="프로필 이미지" />
      </div>

      <div class="name">이한솔</div>

      <div class="job">Connecting Ideas to Execution</div>
    </div>

    <div class="card-right">
      <div class="info">
        <div class="item">
          <div class="icon">✉️</div>

          <div class="text">
            <div class="label">Email</div>
            <div class="value">
              <a href="mailto:hello@example.com">hello@example.com</a>
            </div>
          </div>
        </div>

        <div class="item">
          <div class="icon">📞</div>

          <div class="text">
            <div class="label">Phone</div>
            <div class="value">
              <a href="tel:01012345678">010-1234-5678</a>
            </div>
          </div>
        </div>
      </div>

      <section class="pm-skills" aria-label="PM Skills">
        <h2 class="pm-title">PM Skills</h2>

        <div class="skill-row">
          <span class="skill-name">일정관리</span>

          <div class="skill-blocks" aria-label="일정관리 8점">
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block empty"></span>
            <span class="block empty"></span>
          </div>

          <span class="skill-score">8/10</span>
        </div>

        <div class="skill-row">
          <span class="skill-name">리스크관리</span>

          <div class="skill-blocks" aria-label="리스크관리 8점">
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block empty"></span>
            <span class="block empty"></span>
          </div>

          <span class="skill-score">8/10</span>
        </div>

        <div class="skill-row">
          <span class="skill-name">커뮤니케이션</span>

          <div class="skill-blocks" aria-label="커뮤니케이션 9점">
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block filled"></span>
            <span class="block empty"></span>
          </div>

          <span class="skill-score">9/10</span>
        </div>
      </section>

      <div class="button-group">
        <a
          class="link-button github-button"
          href="https://github.com/esori0v0"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="이한솔 GitHub 페이지로 이동"
        >
          😺github
        </a>

        <a
          class="link-button introduce-button"
          href="https://drive.google.com/drive/folders/1O_6UX5bACWf0vgLMINxx2sGRNg763Ez_?usp=drive_link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="이한솔 소개 페이지로 이동"
        >
          🙋🏼‍♀️introduce
        </a>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
